<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.M Graphic Design</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* Background */
.bg1, .bg2 {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    z-index: -2;
}

.bg1 {
    background-image: url('ChatGPT Image Apr 30, 2026, 10_23_51 PM.png');
    animation: fade1 10s infinite;
}

.bg2 {
    background-image: url('ChatGPT Image Apr 30, 2026, 10_41_32 PM.png');
    animation: fade2 10s infinite;
}

@keyframes fade1 {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
}

@keyframes fade2 {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
}

body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

/* NAVBAR */
.navbar {
    position: absolute;
    top: 20px;
    right: 30px;
}

.navbar a {
    margin-left: 20px;
    text-decoration: none;
    color: #4fc3ff;
    font-weight: bold;
}

/* Header */
.header {
    text-align: center;
    padding: 40px 20px 10px;
}

.header h1 {
    font-size: 48px;
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(90deg, #4fc3ff, #00ff99, #4fc3ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* LOGO FIX */
.logo {
    text-align: center;
    margin: 20px;
    position: relative;
    z-index: 2;
}

.logo img {
    width: 180px;
}

/* Services */
.services {
    padding: 40px;
}

.services h2 {
    font-size: 32px;
    color: #4fc3ff;
}

.service-list {
    list-style: none;
    padding: 0;
}

.service-row {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #444;
    padding: 10px 0;
}

button {
    background: #4fc3ff;
    border: none;
    padding: 8px 15px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #2aa9e0;
}

/* SLIDESHOW */
.slideshow {
    width: 80%;
    max-width: 500px;
    margin: 40px auto;
    position: relative;
    text-align: center;
}

.slide {
    width: 100%;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    border-radius: 10px;
}

.slide.active {
    opacity: 1;
    position: relative;
}

/* DOTS */
.dots {
    margin-top: 10px;
}

.dot {
    height: 10px;
    width: 10px;
    margin: 5px;
    background-color: #555;
    border-radius: 50%;
    display: inline-block;
}

.dot.active {
    background-color: #4fc3ff;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.8);
  z-index: 999;
}

.popup-box {
  background: #111;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  border: 2px solid #00ffcc;
  box-shadow: 0 0 20px #00ffcc;
  margin: auto;
}

.popup-box h2 {
  color: #4fc3ff;
}

.popup-box button {
  margin-top: 15px;
  padding: 12px 25px;
  font-size: 16px;
  background: #4fc3ff;
  color: black;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 0 10px #4fc3ff;
}

.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
  color: white;
  font-size: 20px;
}

/* FOOTER */
.footer {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: #888;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="navbar">
<a href="index.html">Home</a>
<a href="pricing.html">Pricing</a>
<a href="contact.html">Contact Us</a>
<a href="about.html">About Us</a>
</div>

<div class="header">
<h1>A.M Graphic Design</h1>
</div>

<!-- LOGO BACK -->
<div class="logo">
<img src="ChatGPT Image Apr 30, 2026, 10_24_49 PM.png">
</div>

<div class="services">
<h2>Services</h2>

<ul class="service-list">
<li class="service-row"><span>Video Editing</span><button onclick="window.location.href='page2.html'">Details</button></li>
<li class="service-row"><span>Photo Editing</span><button onclick="window.location.href='page3.html'">Details</button></li>
<li class="service-row"><span>AI Editing</span><button onclick="window.location.href='page4.html'">Details</button></li>
<li class="service-row"><span>Logo Design</span><button onclick="window.location.href='page5.html'">Details</button></li>
<li class="service-row"><span>Pattern Design</span><button onclick="window.location.href='page6.html'">Details</button></li>
<li class="service-row"><span>Book Covers Design</span><button onclick="window.location.href='page7.html'">Details</button></li>
<li class="service-row"><span>Brand Labels Design</span><button onclick="window.location.href='page8.html'">Details</button></li>
</ul>
</div>

<!-- SLIDESHOW -->
<div class="slideshow">
<img src="hours.png" class="slide active">
<img src="order.png" class="slide">
<img src="paypal.png" class="slide">

<div class="dots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <span class="close-btn" onclick="closePopup()">✖</span>
    <h2>Hire Me on Fiverr</h2>
    <button onclick="window.open('https://www.fiverr.com/s/qDZNep9')">CLICK HERE</button>
  </div>
</div>

<div class="footer">
© 2026 A.M Graphic Design. All rights reserved.
</div>

<script>
let slides = document.querySelectorAll(".slide");
let dots = document.querySelectorAll(".dot");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  dots[index].classList.remove("active");

  index = (index + 1) % slides.length;

  slides[index].classList.add("active");
  dots[index].classList.add("active");

}, 3000);

/* POPUP */
setTimeout(() => {
  document.getElementById("popup").style.display = "flex";
}, 5000);

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
