<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A.M Graphic Design</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: #000;
}

/* NAVBAR */
.navbar {
    position: absolute;
    top: 20px;
    right: 30px;
}

.navbar a {
    margin-left: 20px;
    text-decoration: none;
    color: #4fc3ff;
    font-weight: bold;
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px 20px 10px;
}

.header h1 {
    font-size: 48px;
    font-family: 'Orbitron', sans-serif;
    color: #4fc3ff;
}

/* LOGO */
.logo {
    text-align: center;
    margin: 20px;
}

.logo img {
    width: 200px;
}

/* SERVICES */
.services {
    padding: 40px;
}

.services h2 {
    font-size: 28px;
}

.service-list {
    list-style: none;
    padding: 0;
}

.service-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
}

/* BUTTON */
button {
    background: #4fc3ff;
    border: none;
    padding: 6px 12px;
    border-radius: 5px;
}

/* 🔥 SLIDESHOW */
.slideshow {
  width: 90%;
  max-width: 600px;
  margin: 40px auto;
  position: relative;
  height: 250px;
  overflow: hidden;
}

.slide {
  width: 100%;
  height: 100%;
  object-fit: contain;
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
  transition: opacity 1s;
}

.slide.active {
  opacity: 1;
}

/* FOOTER */
.footer {
    text-align: center;
    margin: 20px;
    color: #888;
}
</style>

</head>

<body>

<div class="navbar">
<a href="#">Home</a>
<a href="#">Pricing</a>
<a href="#">Contact</a>
</div>

<div class="header">
<h1>A.M Graphic Design</h1>
</div>

<div class="logo">
<img src="logo.png">
</div>

<div class="services">
<h2>Services</h2>

<ul class="service-list">
<li class="service-row">Video Editing <button>Details</button></li>
<li class="service-row">Photo Editing <button>Details</button></li>
<li class="service-row">AI Editing <button>Details</button></li>
</ul>
</div>

<!-- SLIDESHOW -->
<div class="slideshow">
<img src="hour.png" class="slide active">
<img src="order.png" class="slide">
<img src="paypal.png" class="slide">
</div>

<div class="footer">
© 2026 A.M Graphic Design
</div>

<!-- JS -->
<script>
let slides = document.querySelectorAll(".slide");
let i = 0;

setInterval(() => {
  slides[i].classList.remove("active");
  i = (i + 1) % slides.length;
  slides[i].classList.add("active");
}, 3000);
</script>

</body>
</html>
