<!DOCTYPE html
navbar {
    position: absolute;
    top: 20px;
    right: 30px;
}

.navbar a {
    margin-left: 20px;
    text-decoration: none;
    color: #4fc3ff;
    font-weight: bold;
}

/* Shake */
.navbar a:hover {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    50% { transform: translateX(2px); }
    75% { transform: translateX(-2px); }
    100% { transform: translateX(0); }
}

/* Header */
.header {

}

/* 🔥 UPDATED TITLE STYLE ONLY */

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 15px rgba(79,195,255,0.5);
    letter-spacing: 3px;
}

/* Logo */
.logo {

/* Button */
button {

button:hover {

    .slideshow {
  width: 80%;
  max-width: 700px;
  margin: 40px auto;
  position: relative;
}

.slide {
  width: 100%;
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
  transition: opacity 1s ease-in-out;
  border-radius: 10px;
}

.slide.active {
  opacity: 1;
  position: relative;
}
}

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

  slides[index].classList.remove("active");
