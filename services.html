<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    
    <span class="close" onclick="closePopup()">✖</span>

    <h2 id="title"></h2>

    <div id="priceText" class="price"></div>

    <!-- VIDEO TYPE -->
    <select id="type" style="display:none;" onchange="calc()">
        <option value="1">1 min</option>
        <option value="5">5 min</option>
        <option value="10">10 min</option>
        <option value="more">More</option>
    </select>

    <select id="qty" onchange="calc()"></select>

    <h3 id="total">$10</h3>

    <!-- 🔥 DESCRIPTION -->
    <textarea id="desc" placeholder="Describe your order..."></textarea>

    <button class="checkout" onclick="checkout()">Checkout</button>

  </div>
</div>

<script>

function openPopup(img, title){
    document.getElementById("popup").style.display = "flex";
    document.getElementById("title").innerText = title;

    let typeBox = document.getElementById("type");
    let priceText = document.getElementById("priceText");

    if(title === "Video Editing"){
        typeBox.style.display = "block";
        priceText.innerText = "1min = $10 | 5min = $45 | 10min = $95";
    } else {
        typeBox.style.display = "none";
        priceText.innerText = "1 = $10 | 5 = $40 | 10 = $90";
    }

    calc();
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

window.onload = function(){
    let q = document.getElementById("qty");

    for(let i=1;i<=100;i++){
        let o = document.createElement("option");
        o.value = i;
        o.innerText = i;
        q.appendChild(o);
    }

    calc();
}

function calc(){
    let qty = document.getElementById("qty").value;
    let type = document.getElementById("type").value;
    let title = document.getElementById("title").innerText;

    let price;

    if(title === "Video Editing"){
        if(type == "more"){
            document.getElementById("total").innerText = "Discuss via chat";
            return;
        }

        if(type == "1") price = qty * 10;
        if(type == "5") price = qty * 45;
        if(type == "10") price = qty * 95;

    } else {
        if(qty == 5) price = 40;
        else if(qty == 10) price = 90;
        else price = qty * 10;
    }

    document.getElementById("total").innerText = "$" + price;
}

function checkout(){
    let qty = document.getElementById("qty").value;
    let type = document.getElementById("type").value;
    let total = document.getElementById("total").innerText;
    let title = document.getElementById("title").innerText;

    // 🔥 NEW (description add)
    let desc = document.getElementById("desc").value;

    let msg = "Hello, I want to order:%0A" +
              title +
              (title === "Video Editing" ? "%0AVideo Type: " + type : "") +
              "%0AQuantity: " + qty +
              "%0ATotal: " + total +
              "%0ADescription: " + desc;

    // 🔥 ENCODE FIX
    window.open("https://wa.me/94715445967?text=" + encodeURIComponent(msg));
}

</script>
