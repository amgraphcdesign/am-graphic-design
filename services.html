<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services - A.M Graphic Design</title>
<!-- ✅ FAVICON FIX -->
<link rel="icon" type="image/png" href="ChatGPT Image Apr 30, 2026, 10_24_49 PM.png">
<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#050505,#0a0a0a,#050505);
    color: white;
}

h1 {
    text-align: center;
    color: #4fc3ff;
    margin-top: 20px;
    font-size: 32px;
    text-shadow: 0 0 15px #4fc3ff;
}

.list {
    width: 90%;
    max-width: 650px;
    margin: auto;
}

.row {
    display: flex;
    align-items: center;
    margin: 20px 0;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}

.row:hover {
    transform: scale(1.04);
    box-shadow: 0 0 25px #4fc3ff, 0 0 40px #00ffcc;
}

.row img {
    width: 110px;
    border-radius: 12px;
    margin-right: 20px;
}

.row span {
    font-size: 20px;
}

.popup {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
}

.popup-box {
    background: rgba(20,20,20,0.9);
    padding: 25px;
    border-radius: 18px;
    text-align: center;
    border: 2px solid #4fc3ff;
    box-shadow: 0 0 30px #4fc3ff, 0 0 50px #00ffcc;
    width: 340px;
    position: relative;
}

.price {
    color: #00ff99;
    font-weight: bold;
    margin-bottom: 10px;
}

select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #111;
    color: white;
    margin-top: 10px;
}

#total {
    margin-top: 10px;
    color: #4fc3ff;
}

.checkout {
    background: linear-gradient(45deg,#00ff99,#00cc77);
    padding: 12px;
    margin-top: 15px;
    border: none;
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
}

.close {
    position: absolute;
    right: 15px;
    top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Services</h1>

<div class="list">

<div class="row" onclick="openPopup('video.png','Video Editing')">
<img src="video.png">
<span>Video Editing</span>
</div>

<div class="row" onclick="openPopup('photo.png','Photo Editing')">
<img src="photo.png">
<span>Photo Editing</span>
</div>

<div class="row" onclick="openPopup('pattern.png','Pattern Design')">
<img src="pattern.png">
<span>Pattern Design</span>
</div>

<div class="row" onclick="openPopup('logo.png','Logo Design')">
<img src="logo.png">
<span>Logo Design</span>
</div>

<div class="row" onclick="openPopup('ai.png','AI Editing')">
<img src="ai.png">
<span>AI Editing</span>
</div>

<div class="row" onclick="openPopup('brand.png','Brand Labels Design')">
<img src="brand.png">
<span>Brand Labels Design</span>
</div>

<div class="row" onclick="openPopup('book.png','Book Covers Design')">
<img src="book.png">
<span>Book Covers Design</span>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    
    <span class="close" onclick="closePopup()">✖</span>

    <h2 id="title"></h2>

    <div id="priceText" class="price"></div>

    <!-- VIDEO TYPE ONLY -->
    <select id="type" style="display:none;" onchange="calc()">
        <option value="1">1 min</option>
        <option value="5">5 min</option>
        <option value="10">10 min</option>
        <option value="more">More</option>
    </select>

    <select id="qty" onchange="calc()"></select>

    <h3 id="total">$10</h3>

    <textarea id="desc" placeholder="Describe your order..."></textarea>

    <button class="checkout" onclick="checkout()">Checkout</button>

  </div>
</div>

<script>

function openPopup(img, title){
    document.getElementById("popup").style.display = "flex";
    document.getElementById("title").innerText = title;

    let typeBox = document.getElementById("type");
    let priceText = document.getElementById("priceText");

    if(title === "Video Editing"){
        typeBox.style.display = "block";
        priceText.innerText = "1min = $10 | 5min = $45 | 10min = $95";
    } else {
        typeBox.style.display = "none";
        priceText.innerText = "1 = $10 | 5 = $40 | 10 = $90";
    }

    calc();
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

window.onload = function(){
    let q = document.getElementById("qty");

    for(let i=1;i<=100;i++){
        let o = document.createElement("option");
        o.value = i;
        o.innerText = i;
        q.appendChild(o);
    }

    calc();
}

function calc(){
    let qty = document.getElementById("qty").value;
    let type = document.getElementById("type").value;
    let title = document.getElementById("title").innerText;

    let price;

    if(title === "Video Editing"){
        if(type == "more"){
            document.getElementById("total").innerText = "Discuss via chat";
            return;
        }

        if(type == "1") price = qty * 10;
        if(type == "5") price = qty * 45;
        if(type == "10") price = qty * 95;

    } else {
        if(qty == 5) price = 40;
        else if(qty == 10) price = 90;
        else price = qty * 10;
    }

    document.getElementById("total").innerText = "$" + price;
}

function checkout(){
    let qty = document.getElementById("qty").value;
    let type = document.getElementById("type").value;
    let total = document.getElementById("total").innerText;
    let title = document.getElementById("title").innerText;

    let msg = "Hello, I want to order:%0A" +
              title +
              (title === "Video Editing" ? "%0AVideo Type: " + type : "") +
              "%0AQuantity: " + qty +
              "%0ATotal: " + total;

    window.open("https://wa.me/94715445967?text=" + msg);
}

</script>

</body>
</html>
