<title>Contact Us - A.M Graphic Design</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* 🔥 Background system */
.bg1, .bg2 {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background-size: cover;
    background-position: center;
    z-index: -2;
}

.bg1 {
    background-image: url('ChatGPT Image Apr 30, 2026, 10_23_51 PM.png');
    animation: fade1 10s infinite;
}

.bg2 {
    background-image: url('ChatGPT Image Apr 30, 2026, 10_41_32 PM.png');
    animation: fade2 10s infinite;
}

@keyframes fade1 {
    0% {opacity: 1;}
    50% {opacity: 0;}
    100% {opacity: 1;}
}

@keyframes fade2 {
    0% {opacity: 0;}
    50% {opacity: 1;}
    100% {opacity: 0;}
}

/* Overlay */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    top: 0;
    left: 0;
    z-index: -1;
}

/* Navbar */
.navbar {
    position: absolute;
    top: 20px;
    right: 30px;
}

.navbar a {
    margin-left: 20px;
    color: #4fc3ff;
    text-decoration: none;
    font-weight: bold;
}

.navbar a:hover {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    50% { transform: translateX(2px); }
    75% { transform: translateX(-2px); }
    100% { transform: translateX(0); }
}

/* Header */
.header {
    text-align: center;
    padding: 40px 20px 10px;
}

.header h1 {
    font-size: 40px;
    color: #4fc3ff;
}

/* Logo */
.logo {
    text-align: center;
    margin: 20px;
}

.logo img {
    width: 180px;
}

/* Contact section */
.contact {
    display: flex;
    justify-content: flex-start;
    padding: 40px;
}

/* Left content */
.contact-left {
    max-width: 400px;
}

.contact-left h2 {
    color: #4fc3ff;
    margin-bottom: 20px;
}

.contact-item {
    margin: 10px 0;
}

.label {
    color: #4fc3ff;
    font-weight: bold;
}

.value {
    color: #00ff99;
}

/* Channel image */
.channel {
    margin-top: 20px;
}

.channel img {
    width: 200px;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
}

.channel img:hover {
    transform: scale(1.05);
}
</style>
